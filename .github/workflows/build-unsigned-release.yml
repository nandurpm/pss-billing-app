name: Build Unsigned Release APK

on:
  push:
    branches: [ main ]
    paths:
      - unsigned-release-request.txt

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build unsigned release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Verify unsigned release APK
        run: ls -lh app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Publish temporary unsigned release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          ASSET="Purple-Signature-Salon-v2.1.2-unsigned.apk"
          cp "$APK" "$ASSET"
          gh release delete unsigned-v2.1.2-staging --yes --cleanup-tag || true
          gh release create unsigned-v2.1.2-staging "$ASSET" \
            --title "Unsigned Purple Signature v2.1.2 staging build" \
            --notes "Temporary unsigned APK used only for final private release signing."

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: pss-unsigned-release-v2.1.2
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
