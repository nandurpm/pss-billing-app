name: Build Unsigned Release APK

on:
  push:
    branches: [ main ]
    paths:
      - unsigned-release-request.txt

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build unsigned release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Verify unsigned release APK
        run: ls -lh app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Stage unsigned APK in repository
        run: |
          mkdir -p release-staging
          cp app/build/outputs/apk/release/app-release-unsigned.apk release-staging/Purple-Signature-Salon-v2.1.2-unsigned.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f release-staging/Purple-Signature-Salon-v2.1.2-unsigned.apk
          git commit -m "Stage unsigned Purple Signature v2.1.2 APK" || exit 0
          git push

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: pss-unsigned-release-v2.1.2
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
