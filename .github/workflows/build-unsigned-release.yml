name: Build Unsigned Release APK

on:
  push:
    branches: [ main ]
    paths:
      - unsigned-release-request.txt

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build unsigned release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Verify unsigned release APK
        run: ls -lh app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Stage retrievable base64 chunks
        run: |
          set -e
          APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          rm -rf release-staging/chunks-small
          mkdir -p release-staging/chunks-small/raw
          base64 -w0 "$APK" > release-staging/chunks-small/all-base64.txt
          split -b 4000 -d -a 3 --additional-suffix=.raw release-staging/chunks-small/all-base64.txt release-staging/chunks-small/raw/chunk-
          rm release-staging/chunks-small/all-base64.txt
          mkdir -p release-staging/chunks-small/formatted
          for file in release-staging/chunks-small/raw/chunk-*.raw; do
            name="$(basename "$file" .raw).txt"
            fold -w 80 "$file" > "release-staging/chunks-small/formatted/$name"
          done
          rm -rf release-staging/chunks-small/raw
          find release-staging/chunks-small/formatted -name 'chunk-*.txt' -printf '%f\n' | sort > release-staging/chunks-small/manifest.txt
          sha256sum "$APK" > release-staging/chunks-small/unsigned-sha256.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f release-staging/chunks-small
          git commit -m "Stage retrievable unsigned APK chunks" || exit 0
          git push

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: pss-unsigned-release-v2.1.2
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
